<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin | Gawesh D Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="preloader" id="preloader">
    <div class="preloader-inner">
      <div class="preloader-ring"></div>
      <div class="preloader-text">Loading</div>
    </div>
  </div>

  <canvas id="particles-canvas"></canvas>

  <nav class="navbar" id="navbar">
    <a href="index.html#home" class="nav-logo">
      <span>Gawesh</span><span>D.</span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="index.html#home">Home</a>
      <a href="index.html#about">About</a>
      <a href="index.html#projects">Projects</a>
      <a href="index.html#skills">Skills</a>
      <a href="admin.html" class="active">Admin</a>
      <a href="index.html#contact" class="nav-cta">Contact Me</a>
    </div>
    <div class="nav-toggle" id="navToggle">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </nav>
  <div class="nav-overlay" id="navOverlay"></div>

  <main>
    <section class="admin admin-page" id="admin">
      <div class="section-header reveal">
        <span class="section-tag">Admin</span>
        <h1 class="section-title">Manage <span class="highlight">Portfolio</span></h1>
        <p class="section-desc">Add new projects and skills directly from this page</p>
      </div>
      <div class="admin-panel reveal" id="adminPanel">
        <div class="admin-login" id="adminLogin">
          <div class="admin-panel-header">
            <div>
              <h3>Admin Login</h3>
              <p>Enter the password to manage portfolio items.</p>
            </div>
            <i class="fa-solid fa-lock"></i>
          </div>
          <div class="admin-login-row">
            <input type="password" id="adminPassword" placeholder="Password" aria-label="Admin password" />
            <button type="button" class="admin-btn" id="adminLoginBtn">
              <i class="fa-solid fa-right-to-bracket"></i> Login
            </button>
          </div>
          <p class="admin-message" id="adminLoginMessage"></p>
        </div>

        <div class="admin-dashboard" id="adminDashboard" hidden>
          <div class="admin-panel-header">
            <div>
              <h3>Portfolio Admin</h3>
              <p>Add items below. Changes are saved in this browser.</p>
            </div>
            <button type="button" class="admin-btn secondary" id="adminLogoutBtn">
              <i class="fa-solid fa-lock"></i> Logout
            </button>
          </div>

          <div class="admin-forms">
            <form class="admin-form" id="projectForm">
              <h4><i class="fa-solid fa-folder-plus"></i> Add Project</h4>
              <input type="text" id="projectTitle" placeholder="Project title" required />
              <input type="text" id="projectCategory" placeholder="Category" required />
              <textarea id="projectDescription" placeholder="Project description" required></textarea>
              <input type="url" id="projectUrl" placeholder="Project link (optional)" />
              <button type="submit" class="admin-btn">
                <i class="fa-solid fa-plus"></i> Add Project
              </button>
            </form>

            <form class="admin-form" id="skillForm">
              <h4><i class="fa-solid fa-lightbulb"></i> Add Skill</h4>
              <input type="text" id="skillCategory" placeholder="Skill category" required />
              <input type="text" id="skillName" placeholder="Skill name" required />
              <button type="submit" class="admin-btn">
                <i class="fa-solid fa-plus"></i> Add Skill
              </button>
            </form>
          </div>

          <p class="admin-message success" id="adminSaveMessage"></p>
        </div>
      </div>
    </section>
  </main>

  <button class="back-to-top" id="backToTop" aria-label="Back to top">
    <i class="fa-solid fa-arrow-up"></i>
  </button>

  <script src="script.js"></script>
</body>

</html>
